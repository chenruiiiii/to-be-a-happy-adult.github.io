name: Deploy static content to Pages

on:
  push:
    branches: ['main'] # 只要 main 分支有变动就触发
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true # 如果你用了第三方主题，这一步必须有

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npx hexo generate # 🛠️ 这一步会在服务器上生成 public 文件夹

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './public' # ✅ 只上传生成的静态文件

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
